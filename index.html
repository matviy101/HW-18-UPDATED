<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CRUD Students</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Student List</h1>
    <button id="get-students-btn">Get Students</button>



    <table id="students-table">
      <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Skills</th>
    <th>Email</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>
</thead>

      <tbody>
        <!-- Dynamically populated -->
      </tbody>
    </table>



    <h2>Add new student</h2>

    <form id="add-student-form">
      <label>Name: <input type="text" id="name" required></label>
      <label>Age: <input type="number" id="age" required></label>
      <label>Course: <input type="text" id="course" required></label>
      <label>Skills (separated by commas): <input type="text" id="skills" required></label>
      <label>Email: <input type="email" id="email" required></label>
      <label>Enrolled: <input type="checkbox" id="isEnrolled"></label>
      <button type="submit" id="submit">Add student</button>
    </form>
  </div>

 <script src="./functions.js" type="module"></script>

</body>

</html>
